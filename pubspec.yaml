name: roomzy_find

description: RoomzyFind - Student Hostel & Apartment Booking System
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Navigation
  go_router: ^14.0.0

  # State management
  provider: ^6.1.2

  # UI & animations
  carousel_slider: ^5.0.0
  animated_text_kit: ^4.2.2
  flutter_animate: ^4.5.0
  shimmer: ^3.0.0
  cached_network_image: ^3.4.0
  font_awesome_flutter: ^10.7.0
  google_fonts: ^6.2.1
  responsive_framework: ^1.4.0
  fl_chart: ^0.69.0

  # Utilities
  image_picker: ^1.1.0
  url_launcher: ^6.3.0
  fluttertoast: ^8.2.4
  webview_flutter: ^4.13.1
  http: ^1.2.0
  shared_preferences: ^2.3.2   # ← moved here (was wrongly inside fonts)

  # Firebase
  firebase_core: ^4.5.0
  cloud_firestore: ^6.1.3
  firebase_auth: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/icons/

  fonts:
    - family: Poppins
      fonts:
        - asset: assets/fonts/Poppins-Regular.ttf
        - asset: assets/fonts/Poppins-Medium.ttf
          weight: 500
        - asset: assets/fonts/Poppins-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Poppins-Bold.ttf
          weight: 700