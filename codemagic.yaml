workflows:
  android-build:
    name: Android Build
    max_build_duration: 60

    environment:
      flutter: stable
      android_signing:
        - roomzy_keystore

    scripts:
      - name: Get packages
        script: flutter pub get

      - name: Build APK
        script: |
          flutter build apk --release --split-per-abi --obfuscate --split-debug-info=build/debug-info

    artifacts:
      - build/app/outputs/flutter-apk/*.apk